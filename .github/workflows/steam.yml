name: Update Steam Data

on:
  schedule:
    # Every 3 hours — recently played games update frequently
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-steam:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Fetch Steam Data
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID:      ${{ secrets.STEAM_ID }}
        run: node scripts/fetch-steam.mjs

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/steam-data.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: otomatik steam verisi güncelleme"
          git push
